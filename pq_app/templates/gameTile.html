{% extends "base.html" %}

{% block title %}PyQuest Game{% endblock %}

{% block content %}
    <h1>PyQuest Game</h1>

    {# Stable elements that must survive AJAX swaps of #tile-mount #}
    <div id="action-feedback" style="margin:10px 0; color:#b22; display:none"></div>

    <div id="tile-mount">
        {% include "_tile_fragment.html" %}
    </div>

    <!-- Combat Action Modal (outside #tile-mount so it is never replaced) -->
    <div id="combat-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Choose Your Combat Action</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="combat-actions-grid" class="combat-actions-grid">
                    <!-- Actions will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
    (function(){
        var feedback = document.getElementById('action-feedback');
        var modal = document.getElementById('combat-modal');
        var modalClose = modal ? modal.querySelector('.modal-close') : null;
        var modalOverlay = modal ? modal.querySelector('.modal-overlay') : null;

        // The tile form is re-rendered on every AJAX swap, so always look it up live and
        // read its current player/tile/type from data attributes rather than caching them.
        function getForm(){ return document.getElementById('tile-form'); }
        function ctx(){
            var f = getForm();
            if (!f) return null;
            return {
                form: f,
                playerId: f.dataset.playerId,
                tileId: f.dataset.tileId,
                tileType: f.dataset.tileType
            };
        }

        function showFeedback(msg, isError){
            if (!feedback) return;
            feedback.textContent = msg;
            feedback.style.color = isError ? '#b22' : '#080';
            feedback.style.display = 'block';
            if (!isError) setTimeout(function(){ feedback.style.display = 'none'; }, 4000);
        }

        function showModal(){
            if (modal){ modal.style.display = 'block'; setTimeout(function(){ modal.classList.add('show'); }, 10); }
        }
        function hideModal(){
            if (modal){ modal.classList.remove('show'); setTimeout(function(){ modal.style.display = 'none'; }, 300); }
        }

        function applyResponse(data){
            if (data.redirect){ window.location = data.redirect; return; }
            if (data.action_result) showFeedback(data.action_result, false);
            if (data.tile_html){
                var mount = document.getElementById('tile-mount');
                if (mount) mount.innerHTML = data.tile_html;
            }
        }

        function postAction(actionUrl, fd, btn){
            if (btn){ if (btn.dataset.sending === '1') return; btn.dataset.sending = '1'; btn.disabled = true; }
            fetch(actionUrl, {
                method: 'POST', body: fd,
                headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' },
                credentials: 'same-origin'
            }).then(function(resp){
                return resp.json().then(function(data){ if (!resp.ok) throw data; return data; });
            }).then(applyResponse).catch(function(err){
                showFeedback((err && err.error) || (err && err.message) || 'Unexpected server error', true);
            }).finally(function(){
                if (btn){ btn.dataset.sending = '0'; btn.disabled = false; }
            });
        }

        function getCombatIcon(code){
            var icons = {
                'attack_light': '⚔️', 'attack_heavy': '🗡️', 'fireball': '🔥', 'power_strike': '💪',
                'divine_heal': '✨', 'heal': '💊', 'defend': '🛡️', 'flee': '🏃',
                'elven_grace': '🌿', 'pandarian_calm': '☯️'
            };
            return icons[code] || '⚡';
        }

        function renderCombatActions(actions){
            var grid = document.getElementById('combat-actions-grid');
            if (!grid) return;
            if (!actions || actions.length === 0){
                grid.innerHTML = '<div class="no-actions">No combat actions available</div>';
                return;
            }
            grid.innerHTML = '';
            actions.forEach(function(action){
                var card = document.createElement('div');
                card.className = 'combat-action-card';
                var icon = getCombatIcon(action.code);
                var damageInfo = action.damage_max > 0 ? '<div class="stat damage">⚔️ ' + action.damage_min + '-' + action.damage_max + ' dmg</div>' : '';
                var healInfo = action.heal_amount > 0 ? '<div class="stat heal">❤️ +' + action.heal_amount + ' HP</div>' : '';
                var defenseInfo = action.defense_boost > 0 ? '<div class="stat defense">🛡️ +' + action.defense_boost + ' def</div>' : '';
                var classReq = action.requires_class ? '<span class="requirement">' + action.requires_class + '</span>' : '';
                var raceReq = action.requires_race ? '<span class="requirement">' + action.requires_race + '</span>' : '';
                card.innerHTML =
                    '<div class="action-icon">' + icon + '</div>' +
                    '<div class="action-name">' + action.name + classReq + raceReq + '</div>' +
                    '<div class="action-description">' + (action.description || '') + '</div>' +
                    '<div class="action-stats">' + damageInfo + healInfo + defenseInfo + '</div>' +
                    '<div class="action-success">Success: ' + action.success_rate + '%</div>';
                card.dataset.code = action.code;
                card.addEventListener('click', function(){ executeCombatAction(action.code); });
                grid.appendChild(card);
            });
        }

        function loadCombatActions(){
            var grid = document.getElementById('combat-actions-grid');
            var c = ctx();
            if (!grid || !c) return;
            grid.innerHTML = '<div class="loading">Loading combat actions...</div>';
            fetch('/player/' + c.playerId + '/game/tile/' + c.tileId + '/combat-actions', {
                headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' },
                credentials: 'same-origin'
            }).then(function(resp){
                if (!resp.ok) throw new Error('Failed to load actions');
                return resp.json();
            }).then(function(data){
                renderCombatActions(data.available_actions);
            }).catch(function(){
                grid.innerHTML = '<div class="error">Failed to load combat actions</div>';
            });
        }

        function executeCombatAction(code){
            hideModal();
            var c = ctx();
            if (!c) return;
            var btn = document.getElementById('take-action');
            var actionUrl = (btn && btn.getAttribute('formaction')) || c.form.action;
            var fd = new FormData(c.form);
            fd.append('combat_action_code', code);
            postAction(actionUrl, fd, btn);
        }

        // Event delegation: works for the initial form AND every AJAX-swapped form.
        document.addEventListener('click', function(e){
            var btn = e.target.closest ? e.target.closest('#take-action') : null;
            if (!btn) return;
            e.preventDefault();
            var c = ctx();
            if (!c) return;
            var select = c.form.querySelector('select[name="action"]');
            var selectedAction = select ? select.value : '';
            var opt = select ? select.options[select.selectedIndex] : null;
            var actionName = opt ? opt.textContent.toLowerCase() : '';

            if (selectedAction === 'quit' && !confirm('Are you sure you want to quit this adventure?')) return;

            // Open the combat modal for a fight on a monster tile.
            if ((selectedAction === 'fight' || actionName.indexOf('fight') !== -1) && c.tileType === 'monster'){
                loadCombatActions();
                showModal();
                return;
            }

            var actionUrl = btn.getAttribute('formaction') || c.form.action;
            postAction(actionUrl, new FormData(c.form), btn);
        });

        // Stable modal close handlers.
        if (modalClose) modalClose.addEventListener('click', hideModal);
        if (modalOverlay) modalOverlay.addEventListener('click', hideModal);
        document.addEventListener('keydown', function(e){
            if (e.key === 'Escape' && modal && modal.style.display === 'block') hideModal();
        });
    })();
    </script>
{% endblock %}
